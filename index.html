<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PYSIGA | Dashboard Sanitario</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p: #1b4332; --s: #2d6a4f; --r: #d90429; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; color: #333; }
        header { background: var(--p); color: white; padding: 15px 20px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; }
        
        /* Grid de 11 KPIs */
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .kpi-card { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid var(--s); }
        .kpi-val { font-size: 1.8rem; font-weight: bold; color: var(--p); display: block; margin-bottom: 5px; }
        .kpi-label { font-size: 0.8rem; color: #555; font-weight: bold; text-transform: uppercase; }
        .kpi-meta { font-size: 0.75rem; color: #888; display: block; margin-top: 5px; }

        /* Gráficos Responsivos */
        .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .chart-box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .chart-wrapper { position: relative; height: 35vh; width: 100%; }

        /* Selector y Tablas */
        .table-section { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 40px; }
        select { width: 100%; padding: 12px; font-size: 1rem; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #e9ecef; color: var(--p); position: sticky; top: 0; }
        .prioridad { color: var(--r); font-weight: bold; }

        /* Loader */
        #loader { text-align: center; padding: 50px; font-size: 1.2rem; color: var(--p); }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size: 1.5rem;">📊 TABLERO DE CONTROL SANITARIO</h1>
</header>

<div class="container">
    <div id="loader">Cargando indicadores y calculando poblaciones meta... 🐄</div>
    
    <div id="dashboard" style="display: none;">
        
        <h2 style="font-size: 1.2rem; color: var(--p); border-bottom: 2px solid var(--s); padding-bottom: 5px;">Indicadores de Cobertura</h2>
        <div class="kpi-grid" id="kpi-container">
            </div>

        <h2 style="font-size: 1.2rem; color: var(--p); border-bottom: 2px solid var(--s); padding-bottom: 5px;">Análisis de Insumos y Tiempos</h2>
        <div class="charts-container">
            <div class="chart-box">
                <h3 style="margin-top:0; font-size:1rem; text-align:center;">Uso de Medicamentos (Barras)</h3>
                <div class="chart-wrapper">
                    <canvas id="chartMed"></canvas>
                </div>
            </div>
            <div class="chart-box">
                <h3 style="margin-top:0; font-size:1rem; text-align:center;">Ocurrencia de Actividades por Mes</h3>
                <div class="chart-wrapper">
                    <canvas id="chartMes"></canvas>
                </div>
            </div>
        </div>

        <h2 style="font-size: 1.2rem; color: var(--p); border-bottom: 2px solid var(--s); padding-bottom: 5px;">Auditoría de Animales Faltantes</h2>
        <div class="table-section">
            <select id="selectorFaltantes" onchange="mostrarTabla()"></select>
            <div style="overflow-x: auto; max-height: 400px;">
                <table>
                    <thead>
                        <tr>
                            <th>ID Animal</th>
                            <th>Nro Práctico</th>
                            <th>Clasificación</th>
                            <th>Estatus</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    let datosGlobales = {};

    async function loadData() {
        const url = "https://pysiga.d-alexjose.workers.dev"; 
        const email = new URLSearchParams(window.location.search).get('email') || localStorage.getItem('email');
        
        if (!email) {
            document.getElementById('loader').innerText = "Error: Correo no proporcionado.";
            return;
        }

        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ accion: "reporteSanitario", email: email })
            });
            const data = await response.json();

            if (data.ok) {
                datosGlobales = data;
                document.getElementById('loader').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                renderKPIs(data.kpis);
                renderCharts(data.graficoMedicamentos, data.graficoActividades);
                setupSelector(data.faltantes);
            } else {
                document.getElementById('loader').innerText = "Error del servidor: " + data.error;
            }
        } catch (e) {
            document.getElementById('loader').innerText = "Error de conexión: " + e.message;
        }
    }

    function renderKPIs(kpis) {
        const container = document.getElementById('kpi-container');
        container.innerHTML = kpis.map(k => `
            <div class="kpi-card">
                <span class="kpi-val ${k.pct < 80 ? 'prioridad' : ''}">${k.pct}%</span>
                <span class="kpi-label">${k.nombre}</span>
                <span class="kpi-meta">Población Meta: ${k.meta}</span>
            </div>
        `).join('');
    }

    function renderCharts(meds, meses) {
        // Gráfico de Medicamentos (Forzado a BARRAS)
        new Chart(document.getElementById('chartMed'), {
            type: 'bar',
            data: {
                labels: meds.labels,
                datasets: [{ 
                    label: 'Dosis / Aplicaciones', 
                    data: meds.valores, 
                    backgroundColor: '#2d6a4f',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });

        // Gráfico de Meses (BARRAS)
        new Chart(document.getElementById('chartMes'), {
            type: 'bar',
            data: {
                labels: meses.labels,
                datasets: [{ 
                    label: 'Tratamientos Realizados', 
                    data: meses.valores, 
                    backgroundColor: '#1b4332',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }
            }
        });
    }

    function setupSelector(faltantes) {
        const selector = document.getElementById('selectorFaltantes');
        Object.keys(faltantes).forEach(k => {
            const opt = document.createElement('option');
            opt.value = k;
            opt.text = `Pendientes por: ${faltantes[k].nombre} (${faltantes[k].lista.length} animales)`;
            selector.appendChild(opt);
        });
        mostrarTabla(); // Cargar la primera por defecto
    }

    function mostrarTabla() {
        const key = document.getElementById('selectorFaltantes').value;
        const lista = datosGlobales.faltantes[key].lista;
        const tbody = document.getElementById('tabla-body');
        
        if (lista.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:green; font-weight:bold;">¡Felicidades! 100% de cobertura en esta categoría.</td></tr>`;
            return;
        }

        tbody.innerHTML = lista.map(a => `
            <tr>
                <td><code>${a.id}</code></td>
                <td><strong>${a.num}</strong></td>
                <td>${a.clasif}</td>
                <td class="prioridad">Requiere Atención</td>
            </tr>
        `).join('');
    }

    window.onload = loadData;
</script>
</body>
</html>
